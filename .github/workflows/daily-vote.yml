name: Daily Sunny Vote

on:
  schedule:
    # Runs at 13:00 UTC every day, which is 9:00 AM Eastern Time
    - cron: '0 13 * * *'
  workflow_dispatch: # This line adds a button so you can trigger it manually

jobs:
  run-vote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies & Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium

      - name: Run Voting Script
        run: node voteBot.js
